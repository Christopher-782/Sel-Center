<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEL POS - Sale Associate</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #6b4423;
        --primary-dark: #3d2517;
        --primary-light: #8b5e3c;
        --primary-accent: #a67b5b;
        --secondary: #10b981;
        --danger: #c03a2b;
        --warning: #f59e0b;
        --info: #007bff;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-600: #475569;
        --gray-700: #334155;
        --gray-800: #1e293b;
        --gray-900: #0f172a;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md:
          0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg:
          0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--gray-50);
        color: var(--gray-800);
        overflow: hidden;
      }

      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gray-300);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--gray-400);
      }

      /* POS Container */
      .pos-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        background: var(--gray-50);
      }

      /* Header */
      .pos-header {
        height: 56px;
        background: linear-gradient(
          135deg,
          var(--primary-dark),
          var(--primary)
        );
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        color: #fff;
        box-shadow: var(--shadow-md);
        z-index: 10;
        flex-shrink: 0;
      }

      .pos-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .pos-logo {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      .pos-logo span {
        color: var(--primary-accent);
      }

      .pos-header-title {
        font-size: 13px;
        font-weight: 500;
        opacity: 0.9;
        border-left: 1px solid rgba(255, 255, 255, 0.2);
        padding-left: 12px;
      }

      .pos-header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .pos-header-btn {
        width: 32px;
        height: 32px;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        font-size: 12px;
      }

      .pos-header-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Search Bar */
      .pos-search-bar {
        padding: 10px 20px;
        background: #fff;
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
      }

      .search-wrapper {
        flex: 1;
        position: relative;
      }

      .search-wrapper i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray-400);
        font-size: 13px;
      }

      .search-input {
        width: 100%;
        padding: 8px 12px 8px 36px;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-md);
        font-size: 13px;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        color: var(--gray-800);
        background: var(--gray-50);
        transition: var(--transition);
        outline: none;
      }

      .search-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(107, 68, 35, 0.1);
        background: #fff;
      }

      .search-input::placeholder {
        color: var(--gray-400);
        font-weight: 400;
      }

      .date-input {
        padding: 8px 12px;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-md);
        font-size: 13px;
        font-family: "Inter", sans-serif;
        color: var(--gray-800);
        background: var(--gray-50);
        outline: none;
        transition: var(--transition);
      }

      .date-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(107, 68, 35, 0.1);
        background: #fff;
      }

      /* Main Content */
      .pos-main {
        display: flex;
        flex: 1;
        gap: 12px;
        padding: 12px 20px;
        overflow: hidden;
        min-height: 0;
      }

      /* Cart Panel */
      .cart-panel {
        width: 340px;
        min-width: 340px;
        background: #fff;
        border-radius: var(--radius-lg);
        border: 1px solid var(--gray-200);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .cart-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--gray-100);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }

      .cart-header h3 {
        font-size: 14px;
        font-weight: 700;
        color: var(--gray-800);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .cart-header h3 i {
        color: var(--primary);
      }

      .cart-badge {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
      }

      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 0 16px;
        min-height: 0;
      }

      .cart-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--gray-400);
        gap: 10px;
        padding: 40px 20px;
      }

      .cart-empty i {
        font-size: 40px;
        opacity: 0.5;
      }

      .cart-empty p {
        font-size: 13px;
        font-weight: 500;
      }

      .cart-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 0;
        border-bottom: 1px solid var(--gray-100);
        transition: var(--transition);
      }

      .cart-item:hover {
        background: var(--gray-50);
        margin: 0 -16px;
        padding: 12px 16px;
      }

      .cart-item-info {
        flex: 1;
        min-width: 0;
      }

      .cart-item-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--gray-800);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .cart-item-price {
        font-size: 11px;
        color: var(--gray-500);
        margin-top: 2px;
      }

      .cart-item-qty {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .qty-btn {
        width: 24px;
        height: 24px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--gray-200);
        background: #fff;
        color: var(--gray-600);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        transition: var(--transition);
        font-weight: 700;
      }

      .qty-btn:hover {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }

      .cart-item-qty span {
        font-size: 13px;
        font-weight: 700;
        color: var(--gray-800);
        min-width: 20px;
        text-align: center;
      }

      .cart-item-total {
        font-size: 13px;
        font-weight: 700;
        color: var(--primary);
        min-width: 60px;
        text-align: right;
      }

      .cart-item-remove {
        width: 24px;
        height: 24px;
        border-radius: var(--radius-sm);
        border: none;
        background: rgba(192, 58, 43, 0.1);
        color: var(--danger);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        transition: var(--transition);
      }

      .cart-item-remove:hover {
        background: var(--danger);
        color: #fff;
      }

      /* Cart Summary */
      .cart-summary {
        padding: 12px 16px;
        border-top: 1px solid var(--gray-100);
        background: var(--gray-50);
        flex-shrink: 0;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--gray-600);
      }

      .summary-row.total {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--gray-200);
        font-size: 18px;
        font-weight: 800;
        color: var(--primary);
      }

      /* Product Panel */
      .product-panel {
        flex: 1;
        background: #fff;
        border-radius: var(--radius-lg);
        border: 1px solid var(--gray-200);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }

      .product-tabs {
        display: flex;
        padding: 12px 16px 0;
        gap: 6px;
        border-bottom: 1px solid var(--gray-100);
        flex-shrink: 0;
        overflow-x: auto;
      }

      .product-tab {
        padding: 8px 16px;
        border-radius: var(--radius-md) var(--radius-md) 0 0;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--gray-500);
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        transition: var(--transition);
        font-family: "Inter", sans-serif;
        white-space: nowrap;
      }

      .product-tab:hover {
        color: var(--gray-700);
        background: var(--gray-50);
      }

      .product-tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
        background: rgba(107, 68, 35, 0.05);
      }

      /* Product Grid - IMPROVED */
      .product-grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
        padding: 16px;
        overflow-y: auto;
        align-content: start;
        min-height: 0;
      }

      /* Product Card - MODERN */
      .product-card {
        background: #fff;
        border-radius: var(--radius-md);
        border: 1px solid var(--gray-200);
        overflow: hidden;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        display: flex;
        flex-direction: column;
      }

      .product-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--primary),
          var(--primary-light)
        );
        opacity: 0;
        transition: var(--transition);
        z-index: 1;
      }

      .product-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-3px);
        border-color: var(--primary-light);
      }

      .product-card:hover::before {
        opacity: 1;
      }

      .product-card:active {
        transform: translateY(-1px);
      }

      .product-card-img {
        width: 100%;
        height: 120px;
        background: var(--gray-100);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      .product-card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: var(--transition);
      }

      .product-card:hover .product-card-img img {
        transform: scale(1.05);
      }

      .product-card-img .no-img {
        font-size: 32px;
        color: var(--gray-300);
      }

      .product-card-body {
        padding: 12px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .product-card-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--gray-800);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
      }

      .product-card-sku {
        font-size: 10px;
        color: var(--gray-400);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .product-card-price {
        font-size: 15px;
        font-weight: 800;
        color: var(--primary);
        margin-top: 2px;
      }

      .product-card-stock {
        font-size: 10px;
        color: var(--gray-500);
        margin-top: 2px;
        padding: 2px 8px;
        background: var(--gray-100);
        border-radius: 20px;
        display: inline-block;
        align-self: flex-start;
        font-weight: 600;
      }

      .product-card-stock.low {
        background: rgba(245, 158, 11, 0.1);
        color: var(--warning);
      }

      .product-card-stock.out {
        background: rgba(192, 58, 43, 0.1);
        color: var(--danger);
      }

      /* Add to cart indicator */
      .product-card::after {
        content: "+";
        position: absolute;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 700;
        color: var(--primary);
        opacity: 0;
        transform: scale(0.8);
        transition: var(--transition);
        box-shadow: var(--shadow-sm);
        backdrop-filter: blur(4px);
      }

      .product-card:hover::after {
        opacity: 1;
        transform: scale(1);
      }

      /* Payment Buttons */
      .payment-panel {
        padding: 12px 20px;
        background: #fff;
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
      }

      .payment-btn {
        flex: 1;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        border: none;
        font-size: 13px;
        font-weight: 700;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: var(--transition);
        color: #fff;
        position: relative;
        overflow: hidden;
      }

      .payment-btn:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      .payment-btn:active {
        transform: translateY(0);
      }

      .payment-btn.cash {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        box-shadow: 0 4px 6px -1px rgba(107, 68, 35, 0.3);
      }

      .payment-btn.card {
        background: linear-gradient(135deg, var(--info), #0056b3);
        box-shadow: 0 4px 6px -1px rgba(0, 123, 255, 0.3);
      }

      .payment-btn.transfer {
        background: linear-gradient(135deg, #555, #333);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      }

      .payment-btn.cancel {
        background: linear-gradient(135deg, var(--danger), #a03020);
        box-shadow: 0 4px 6px -1px rgba(192, 58, 43, 0.3);
        max-width: 100px;
      }

      .payment-btn i {
        font-size: 14px;
      }

      /* Alert */
      .pos-alert {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 1000;
        animation: slideUp 0.3s ease;
        box-shadow: var(--shadow-lg);
        max-width: 500px;
      }

      .pos-alert.error {
        background: rgba(192, 58, 43, 0.95);
        color: #fff;
      }

      .pos-alert.success {
        background: rgba(16, 185, 129, 0.95);
        color: #fff;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .pos-main {
          flex-direction: column;
        }
        .cart-panel {
          width: 100%;
          min-width: auto;
          max-height: 35vh;
        }
        .product-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }
      }

      @media (max-width: 768px) {
        .pos-search-bar {
          flex-direction: column;
          align-items: stretch;
        }
        .payment-panel {
          flex-wrap: wrap;
        }
        .payment-btn.cancel {
          max-width: none;
          flex: 1;
        }
        .product-grid {
          grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
          gap: 10px;
          padding: 12px;
        }
        .product-card-img {
          height: 100px;
        }
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <base target="_blank" />
  </head>
  <body>
    <div class="pos-container">
      <!-- Header -->
      <div class="pos-header">
        <div class="pos-header-left">
          <div class="pos-logo">SEL <span>POS</span></div>
          <div class="pos-header-title">Point of Sale</div>
        </div>
        <div class="pos-header-right">
          <button
            class="pos-header-btn"
            onclick="loadProducts()"
            title="Refresh"
          >
            <i class="fas fa-sync-alt"></i>
          </button>
          <button
            class="pos-header-btn"
            onclick="clearCart()"
            title="Clear Cart"
          >
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="pos-search-bar">
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search products by name or SKU..."
            autocomplete="off"
          />
        </div>
        <input type="datetime-local" id="saleDate" class="date-input" />
      </div>

      <!-- Main Content -->
      <div class="pos-main">
        <!-- Cart Panel -->
        <div class="cart-panel">
          <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> Cart</h3>
            <span class="cart-badge" id="cartBadge">0 items</span>
          </div>
          <div class="cart-items" id="cartItemsContainer">
            <div class="cart-empty">
              <i class="fas fa-cart-plus"></i>
              <p>Your cart is empty</p>
              <p style="font-size: 11px">Click on products to add them</p>
            </div>
          </div>
          <div class="cart-summary">
            <div class="summary-row">
              <span>Items</span>
              <span id="cartItemCount">0</span>
            </div>
            <div class="summary-row">
              <span>Subtotal</span>
              <span>₦<span id="cartSubtotal">0.00</span></span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span>₦<span id="cartTotal">0.00</span></span>
            </div>
          </div>
        </div>

        <!-- Product Panel -->
        <div class="product-panel">
          <div class="product-tabs">
            <button class="product-tab active" data-tab="all">All</button>
            <button class="product-tab" data-tab="food">Food</button>
            <button class="product-tab" data-tab="drink">Drink</button>
            <button class="product-tab" data-tab="games">Games</button>
            <button class="product-tab" data-tab="ticket">Ticket</button>
          </div>
          <div class="product-grid" id="productGrid"></div>
        </div>
      </div>

      <!-- Payment Buttons -->
      <div class="payment-panel">
        <button class="payment-btn cash" onclick="submitSale('cash')">
          <i class="fas fa-money-bill-wave"></i>
          Cash
        </button>
        <button class="payment-btn card" onclick="submitSale('card')">
          <i class="fas fa-credit-card"></i>
          Card
        </button>
        <button class="payment-btn transfer" onclick="submitSale('transfer')">
          <i class="fas fa-exchange-alt"></i>
          Transfer
        </button>
        <button class="payment-btn cancel" onclick="clearCart()">
          <i class="fas fa-times"></i>
          Cancel
        </button>
      </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <script>
      // ============================================
      // DOM ELEMENTS
      // ============================================
      const productGrid = document.getElementById("productGrid");
      const cartItemsContainer = document.getElementById("cartItemsContainer");
      const cartItemCount = document.getElementById("cartItemCount");
      const cartSubtotal = document.getElementById("cartSubtotal");
      const cartTotal = document.getElementById("cartTotal");
      const cartBadge = document.getElementById("cartBadge");
      const searchInput = document.getElementById("searchInput");
      const saleDateInput = document.getElementById("saleDate");
      const alertContainer = document.getElementById("alertContainer");

      // Set default date
      saleDateInput.value = new Date().toISOString().slice(0, 16);

      let products = [];
      let cart = [];
      let currentTab = "all";

      // ============================================
      // ALERT SYSTEM
      // ============================================
      function showAlert(message, type = "error") {
        const alert = document.createElement("div");
        alert.className = `pos-alert ${type}`;
        alert.innerHTML = `
    <i class="fas fa-${type === "error" ? "exclamation-circle" : "check-circle"}"></i>
    ${message}
  `;
        alertContainer.appendChild(alert);
        setTimeout(() => {
          alert.style.opacity = "0";
          alert.style.transform = "translateX(-50%) translateY(20px)";
          setTimeout(() => alert.remove(), 300);
        }, 4000);
      }

      // ============================================
      // LOAD PRODUCTS - Uses window.supabase (from js/supabaseClient.js)
      // ============================================
      async function loadProducts() {
        try {
          const { data, error } = await window.supabase
            .from("inventory_items")
            .select("*")
            .eq("is_active", true)
            .order("name", { ascending: true });

          if (error) throw error;

          products = data || [];
          renderProducts();
        } catch (err) {
          showAlert("Failed to load products: " + err.message, "error");
          console.error(err);
        }
      }

      // ============================================
      // RENDER PRODUCTS - IMPROVED GRID
      // ============================================
      function renderProducts(filtered = null) {
        let items = filtered || products;

        // Filter by tab
        if (currentTab !== "all") {
          items = items.filter(
            (p) => p.category && p.category.toLowerCase() === currentTab,
          );
        }

        productGrid.innerHTML = "";

        if (items.length === 0) {
          productGrid.innerHTML = `
      <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--gray-400);">
        <i class="fas fa-search" style="font-size: 40px; margin-bottom: 12px; opacity: 0.5;"></i>
        <p style="font-size: 14px; font-weight: 600;">No products found</p>
        <p style="font-size: 12px; margin-top: 6px;">Try a different search or category</p>
      </div>
    `;
          return;
        }

        items.forEach((p, index) => {
          const div = document.createElement("div");
          div.className = "product-card";
          div.style.animation = `fadeIn 0.3s ease ${index * 0.02}s both`;

          const isLowStock =
            p.quantity <= (p.low_stock_threshold || 10) && p.quantity > 0;
          const isOutOfStock = p.quantity <= 0;

          let stockClass = "";
          let stockText = `${p.quantity} in stock`;
          if (isOutOfStock) {
            stockClass = "out";
            stockText = "Out of stock";
            div.style.opacity = "0.6";
            div.style.pointerEvents = "none";
          } else if (isLowStock) {
            stockClass = "low";
            stockText = `Low: ${p.quantity} left`;
          }

          const imgHTML = p.image_url
            ? `<div class="product-card-img"><img src="${p.image_url}" alt="${p.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas fa-box no-img\'></i>'"></div>`
            : `<div class="product-card-img"><i class="fas fa-box no-img"></i></div>`;

          div.innerHTML = `
      ${imgHTML}
      <div class="product-card-body">
        <div class="product-card-name">${p.name}</div>
        <div class="product-card-sku">${p.sku || "No SKU"}</div>
        <div class="product-card-price">₦${parseFloat(p.price).toFixed(2)}</div>
        <div class="product-card-stock ${stockClass}">${stockText}</div>
      </div>
    `;

          if (!isOutOfStock) {
            div.onclick = () => addToCart(p);
          }

          productGrid.appendChild(div);
        });
      }

      // Add fadeIn animation
      const animStyle = document.createElement("style");
      animStyle.textContent = `
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
`;
      document.head.appendChild(animStyle);

      // ============================================
      // TAB FILTERING
      // ============================================
      document.querySelectorAll(".product-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".product-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          currentTab = tab.dataset.tab;

          // Re-apply search filter if there's text in search
          const query = searchInput.value.trim().toLowerCase();
          if (query) {
            const filtered = products.filter(
              (p) =>
                p.name.toLowerCase().includes(query) ||
                (p.sku && p.sku.toLowerCase().includes(query)),
            );
            renderProducts(filtered);
          } else {
            renderProducts();
          }
        });
      });

      // ============================================
      // SEARCH FUNCTIONALITY - FIXED
      // ============================================
      function handleSearch() {
        const query = searchInput.value.trim().toLowerCase();

        if (!query) {
          renderProducts();
          return;
        }

        const filtered = products.filter(
          (p) =>
            p.name.toLowerCase().includes(query) ||
            (p.sku && p.sku.toLowerCase().includes(query)),
        );

        renderProducts(filtered);
      }

      // Attach search event listeners - MULTIPLE for reliability
      searchInput.addEventListener("input", handleSearch);
      searchInput.addEventListener("keyup", handleSearch);
      searchInput.addEventListener("change", handleSearch);

      // ============================================
      // CART FUNCTIONS
      // ============================================
      function addToCart(product) {
        if (product.quantity <= 0) {
          showAlert(`${product.name} is out of stock!`, "error");
          return;
        }

        const existing = cart.find((c) => c.id === product.id);
        if (existing) {
          if (existing.quantity >= product.quantity) {
            showAlert(
              `Only ${product.quantity} units available for ${product.name}`,
              "error",
            );
            return;
          }
          existing.quantity++;
          existing.total_price = existing.quantity * product.price;
        } else {
          cart.push({ ...product, quantity: 1, total_price: product.price });
        }
        renderCart();
        showAlert(`${product.name} added to cart`, "success");
      }

      function updateCartQty(id, change) {
        const item = cart.find((c) => c.id === id);
        const product = products.find((p) => p.id === id);
        if (!item || !product) return;

        const newQty = item.quantity + change;
        if (newQty <= 0) {
          removeCart(id);
          return;
        }
        if (newQty > product.quantity) {
          showAlert(`Only ${product.quantity} units available`, "error");
          return;
        }

        item.quantity = newQty;
        item.total_price = item.quantity * item.price;
        renderCart();
      }

      function removeCart(id) {
        cart = cart.filter((c) => c.id !== id);
        renderCart();
      }

      function clearCart() {
        if (cart.length === 0) return;
        if (!confirm("Clear all items from cart?")) return;
        cart = [];
        renderCart();
      }

      function renderCart() {
        if (cart.length === 0) {
          cartItemsContainer.innerHTML = `
      <div class="cart-empty">
        <i class="fas fa-cart-plus"></i>
        <p>Your cart is empty</p>
        <p style="font-size: 11px;">Click on products to add them</p>
      </div>
    `;
          cartItemCount.textContent = "0";
          cartSubtotal.textContent = "0.00";
          cartTotal.textContent = "0.00";
          cartBadge.textContent = "0 items";
          return;
        }

        cartItemsContainer.innerHTML = "";
        let total = 0;
        let itemCount = 0;

        cart.forEach((c) => {
          total += c.total_price;
          itemCount += c.quantity;

          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `
      <div class="cart-item-info">
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-price">₦${parseFloat(c.price).toFixed(2)} each</div>
      </div>
      <div class="cart-item-qty">
        <button class="qty-btn" onclick="updateCartQty(${c.id}, -1)">-</button>
        <span>${c.quantity}</span>
        <button class="qty-btn" onclick="updateCartQty(${c.id}, 1)">+</button>
      </div>
      <div class="cart-item-total">₦${c.total_price.toFixed(2)}</div>
      <button class="cart-item-remove" onclick="removeCart(${c.id})">
        <i class="fas fa-trash"></i>
      </button>
    `;
          cartItemsContainer.appendChild(div);
        });

        cartItemCount.textContent = itemCount;
        cartSubtotal.textContent = total.toFixed(2);
        cartTotal.textContent = total.toFixed(2);
        cartBadge.textContent = `${itemCount} item${itemCount !== 1 ? "s" : ""}`;
      }

      // ============================================
      // RECEIPT PRINTING
      // ============================================
      function printReceipt(saleRef, cartItems, paymentMode, totalAmount) {
        let receiptContent = `<div style="width:220px; font-family:monospace; padding:10px;">
    <h3 style="text-align:center; margin:0 0 8px;">*** SEL POS ***</h3>
    <p style="text-align:center; margin:4px 0; font-size:11px;">Sale Ref: ${saleRef}</p>
    <p style="text-align:center; margin:4px 0; font-size:11px;">Payment: ${paymentMode.toUpperCase()}</p>
    <hr style="border:none; border-top:1px dashed #333; margin:8px 0;">`;

        cartItems.forEach((item) => {
          const name =
            item.name.length > 20 ? item.name.slice(0, 20) + "..." : item.name;
          receiptContent += `
      <p style="margin:4px 0; font-size:11px;">
        ${name}<br>
        ${String(item.quantity).padStart(3)} x ₦${parseFloat(item.unit_price || item.price).toFixed(2)} = ₦${parseFloat(item.total_price).toFixed(2)}
      </p>`;
        });

        receiptContent += `
    <hr style="border:none; border-top:1px dashed #333; margin:8px 0;">
    <p style="text-align:right; font-weight:bold; margin:4px 0; font-size:13px;">TOTAL: ₦${parseFloat(totalAmount).toFixed(2)}</p>
    <p style="text-align:center; margin:8px 0 4px; font-size:10px;">Date: ${new Date().toLocaleString()}</p>
    <p style="text-align:center; margin:0; font-size:10px;">****************************</p>
  </div>`;

        const receiptWindow = window.open("", "_blank", "width=250,height=600");
        receiptWindow.document.write(receiptContent);
        receiptWindow.document.close();
        receiptWindow.focus();
        setTimeout(() => receiptWindow.print(), 200);
      }

      // ============================================
      // SUBMIT SALE - Uses window.supabase (from js/supabaseClient.js)
      // ============================================
      async function submitSale(payment_mode) {
        if (cart.length === 0) {
          showAlert("Select at least one item.", "error");
          return;
        }

        try {
          const {
            data: { user },
            error: userError,
          } = await window.supabase.auth.getUser();
          if (userError || !user) throw new Error("Not authenticated");

          const sale_reference = "SALE-" + Date.now();
          const totalAmount = cart.reduce((a, c) => a + c.total_price, 0);

          const saleData = await window.supabase
            .from("sales")
            .insert([
              {
                sale_reference,
                payment_mode,
                total_amount: totalAmount,
                sold_by: user.id,
                created_at: saleDateInput.value,
              },
            ])
            .select()
            .single();

          if (saleData.error) throw saleData.error;

          const sale_id = saleData.data.id;
          const saleItems = cart.map((c) => ({
            sale_id,
            item_id: c.id,
            quantity: c.quantity,
            unit_price: c.price,
            total_price: c.total_price,
          }));

          const { error: itemsError } = await window.supabase
            .from("sale_items")
            .insert(saleItems);
          if (itemsError) throw itemsError;

          // Update stock
          for (const c of cart) {
            const item = products.find((p) => p.id === c.id);
            const newQty = item.quantity - c.quantity;
            await window.supabase
              .from("inventory_items")
              .update({
                quantity: newQty,
                updated_at: new Date().toISOString(),
              })
              .eq("id", c.id);

            if (newQty <= item.low_stock_threshold) {
              showAlert(`${item.name} low stock: ${newQty} left`, "error");
            }
          }

          printReceipt(sale_reference, cart, payment_mode, totalAmount);
          showAlert(`Sale completed! Ref: ${sale_reference}`, "success");

          clearCart();
          loadProducts();
        } catch (err) {
          console.error(err);
          showAlert(err.message, "error");
        }
      }

      // ============================================
      // INITIALIZE
      // ============================================
      document.addEventListener("DOMContentLoaded", () => {
        loadProducts();
      });
    </script>
  </body>
</html>
